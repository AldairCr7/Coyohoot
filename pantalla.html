<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coyohoot | Pantalla en vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    :root{
      --bg:#0f0a1e;
      --panel:#1a1030;
      --card:rgba(255,255,255,.045);
      --card2:rgba(255,255,255,.075);
      --line:rgba(167,139,250,.20);
      --line2:rgba(167,139,250,.35);
      --text:#f8fafc;
      --muted:#94a3b8;
      --accent:#a78bfa;
      --accent2:#60a5fa;
      --purple:#7c3aed;
      --pink:#ec4899;
      --success:#10b981;
      --danger:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:'Poppins','Segoe UI',system-ui,sans-serif;
      color:var(--text);
      background:var(--bg);
      padding:clamp(.75rem,1.6vw,1.25rem);
      overflow:auto;
    }
    .screen-container{
      width:min(1280px,100%);
      min-height:calc(100vh - clamp(1.5rem,3.2vw,2.5rem));
      margin:0 auto;
      background:var(--panel);
      border-radius:2rem;
      box-shadow:0 30px 60px -15px rgba(124,58,237,.38);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      border:1px solid rgba(167,139,250,.12);
    }
    .top-bar{
      height:8px;
      flex:0 0 auto;
      background:linear-gradient(90deg,#7c3aed,#a855f7,#ec4899,#a855f7,#7c3aed);
      background-size:300% auto;
      animation:gradientShift 4s ease infinite;
    }
    @keyframes gradientShift{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
    .screen-inner{
      flex:1;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:clamp(.75rem,1.5vw,1.2rem);
      padding:clamp(1rem,2.4vw,2rem);
      min-height:0;
    }
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
      flex-wrap:wrap;
    }
    .brand{display:flex;align-items:center;gap:1rem;min-width:0;}
    .logo-wrap{
      width:clamp(64px,7vw,92px);
      height:clamp(64px,7vw,92px);
      flex:0 0 auto;
      border-radius:1.2rem;
      background:#fff;
      display:grid;
      place-items:center;
      padding:.28rem;
      box-shadow:0 8px 22px rgba(124,58,237,.42);
      overflow:hidden;
    }
    .logo-wrap img{width:100%;height:100%;object-fit:contain;border-radius:.9rem;display:block;}
    h1{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      font-size:clamp(1.45rem,3.2vw,3rem);
      line-height:1.05;
      font-weight:900;
      letter-spacing:-.04em;
      margin:0;
      overflow-wrap:anywhere;
    }
    .subtitle{color:var(--muted);font-size:clamp(.9rem,1.4vw,1.1rem);font-weight:600;margin-top:.2rem;}
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:.45rem;
      border:1.5px solid var(--line2);
      border-radius:999px;
      background:rgba(124,58,237,.14);
      color:#c4b5fd;
      padding:.65rem 1rem;
      font-weight:800;
      white-space:nowrap;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }
    .main{min-height:0;display:flex;align-items:stretch;}
    .display-card{
      width:100%;
      min-height:0;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:1.5rem;
      padding:clamp(1rem,2.4vw,2rem);
      overflow:auto;
    }
    .center{text-align:center;}
    .big{
      font-size:clamp(2.2rem,6vw,5.4rem);
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.06em;
      color:#f8fafc;
      margin:.15rem 0 .35rem;
      overflow-wrap:anywhere;
    }
    .hint{color:var(--muted);font-size:clamp(.95rem,1.4vw,1.25rem);font-weight:600;}
    .section-title{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
    .avatar-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
      gap:clamp(.75rem,1.4vw,1rem);
      margin-top:1.2rem;
    }
    .avatar-card{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:.55rem;
      min-height:150px;
      padding:.9rem;
      border:1px solid var(--line);
      border-radius:1.35rem;
      background:var(--card2);
      overflow:hidden;
    }
    .avatar-card img{width:clamp(72px,8vw,100px);height:clamp(72px,8vw,100px);object-fit:contain;filter:drop-shadow(0 12px 14px rgba(0,0,0,.30));}
    .avatar-name{width:100%;font-size:clamp(.9rem,1.3vw,1.1rem);font-weight:900;text-align:center;overflow-wrap:anywhere;line-height:1.15;}
    .avatar-score{color:#c4b5fd;font-weight:800;font-size:.9rem;}
    .ranking{display:grid;gap:.65rem;margin-top:1rem;}
    .rank-row{
      display:grid;
      grid-template-columns:minmax(46px,64px) minmax(50px,64px) minmax(0,1fr) auto;
      align-items:center;
      gap:.75rem;
      border:1px solid var(--line);
      border-radius:1.25rem;
      background:var(--card2);
      padding:.65rem .85rem;
      min-width:0;
    }
    .rank-row.top1{background:linear-gradient(90deg,rgba(245,158,11,.22),var(--card2));border-color:rgba(245,158,11,.35)}
    .rank-row.top2{background:linear-gradient(90deg,rgba(203,213,225,.18),var(--card2));border-color:rgba(203,213,225,.30)}
    .rank-row.top3{background:linear-gradient(90deg,rgba(217,119,6,.16),var(--card2));border-color:rgba(217,119,6,.30)}
    .pos{font-size:clamp(1.1rem,2vw,1.55rem);font-weight:900;text-align:center;}
    .rank-row img{width:clamp(46px,5.4vw,62px);height:clamp(46px,5.4vw,62px);object-fit:contain;}
    .player-cell{min-width:0;}
    .score{font-size:clamp(1rem,1.8vw,1.45rem);font-weight:900;color:#c4b5fd;text-align:right;white-space:nowrap;}

    .question-layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(140px,190px);
      gap:clamp(1rem,2vw,1.5rem);
      align-items:start;
    }
    .screen-timer{
      position:sticky;
      top:0;
      align-self:start;
      border:1px solid var(--line2);
      border-radius:1.5rem;
      background:rgba(124,58,237,.14);
      padding:1rem;
      text-align:center;
      box-shadow:0 14px 30px rgba(0,0,0,.16);
    }
    .timer-number{
      font-size:clamp(2.8rem,6vw,5rem);
      line-height:.95;
      font-weight:900;
      letter-spacing:-.06em;
      color:#f8fafc;
    }
    .timer-label{
      margin-top:.25rem;
      color:#c4b5fd;
      font-weight:900;
      text-transform:uppercase;
      font-size:.78rem;
      letter-spacing:.08em;
    }
    .timer-track{
      width:100%;
      height:10px;
      margin-top:.85rem;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      overflow:hidden;
    }
    .timer-fill{
      width:100%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--success),var(--accent2),var(--accent));
      transition:width .25s linear;
    }
    .screen-timer.low{
      border-color:rgba(239,68,68,.55);
      background:rgba(239,68,68,.14);
      animation:timerPulse .9s infinite;
    }
    @keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
    .question{
      font-size:clamp(1.45rem,3.9vw,3.6rem);
      line-height:1.13;
      font-weight:900;
      letter-spacing:-.035em;
      margin:0 auto;
      max-width:1100px;
      overflow-wrap:anywhere;
    }
    .options{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:clamp(.75rem,1.5vw,1rem);
      margin-top:clamp(1rem,2vw,1.5rem);
    }
    .option{
      border:1px solid var(--line);
      border-radius:1.25rem;
      background:var(--card2);
      padding:clamp(.75rem,1.6vw,1rem) clamp(.85rem,1.8vw,1.2rem);
      font-size:clamp(.95rem,1.55vw,1.3rem);
      font-weight:800;
      line-height:1.28;
      overflow-wrap:anywhere;
      min-height:72px;
      display:flex;
      align-items:center;
      gap:.45rem;
    }
    .instructions{
      display:grid;
      gap:.75rem;
      margin-top:1.1rem;
      text-align:left;
      list-style:none;
    }
    .instructions li{
      border:1px solid var(--line);
      background:var(--card2);
      border-radius:1.2rem;
      padding:.9rem 1rem;
      font-size:clamp(.98rem,1.55vw,1.3rem);
      line-height:1.35;
      font-weight:700;
    }
    .footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:.75rem;
      color:var(--muted);
      font-weight:700;
      flex-wrap:wrap;
      font-size:clamp(.8rem,1.1vw,.95rem);
    }
    .empty-state{padding:clamp(2rem,5vw,4rem) 1rem;}
    .pulse{animation:pulse 1.6s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
    @media(max-width:760px){
      body{padding:.5rem;}
      .screen-container{border-radius:1.25rem;min-height:calc(100vh - 1rem);}
      .screen-inner{padding:1rem;}
      .header{justify-content:center;text-align:center;}
      .brand{justify-content:center;flex-direction:column;gap:.6rem;}
      .pill{width:100%;}
      .display-card{border-radius:1.15rem;}
      .question-layout{grid-template-columns:1fr;}
      .screen-timer{position:relative;order:-1;}
      .options{grid-template-columns:1fr;}
      .rank-row{grid-template-columns:42px 48px minmax(0,1fr);gap:.55rem;}
      .score{grid-column:3;text-align:left;font-size:1rem;}
      .footer{justify-content:center;text-align:center;}
    }
  </style>
</head>
<body>
  <div class="screen-container">
    <div class="top-bar"></div>
    <div class="screen-inner">
      <header class="header">
        <div class="brand">
          <div class="logo-wrap"><img src="logo.jpeg" alt="Coyohoot"></div>
          <div>
            <h1 id="quizTitle">Coyohoot</h1>
            <div class="subtitle" id="quizSubtitle">Pantalla en vivo</div>
          </div>
        </div>
        <div class="pill pulse" id="statusPill">● En vivo</div>
      </header>
      <main class="main">
        <section class="display-card" id="screenCard">
          <div class="center empty-state"><div class="big">Cargando...</div><p class="hint">Esperando datos del Coyohoot</p></div>
        </section>
      </main>
      <footer class="footer"><span id="participantCount">0 participantes</span><span>Actualización en tiempo real</span></footer>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const quizId = params.get('quizId');
    const titleEl = document.getElementById('quizTitle');
    const subtitleEl = document.getElementById('quizSubtitle');
    const pillEl = document.getElementById('statusPill');
    const cardEl = document.getElementById('screenCard');
    const countEl = document.getElementById('participantCount');
    let quizData = null;
    let participants = [];
    let screenTimerInterval = null;
    const AVATARS = [1,2,3,4,5,6,7,8].map(n => ({ id:n, name:['El Vice','El Presi','La Secre','Nacho','Coyote','Hacker','Ninja','Astro'][n-1], path:`Avatares/Avatar${n}.svg` }));
    function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
    function modeOf(d){return d && (d.gameMode || d.mode || d.modo) === 'supervivencia' ? 'supervivencia' : 'clasico';}
    function avatarOf(p){const byId=AVATARS.find(a=>a.id===Number(p.avatarId)); return p.avatarPath || (typeof p.avatar==='string' && p.avatar.includes('/') ? p.avatar : null) || (byId?byId.path:AVATARS[0].path);}
    function avatarImg(p){return `<img src="${esc(avatarOf(p))}" alt="" onerror="this.src='Avatares/Avatar1.svg'; this.onerror=null;">`;}
    function statusOf(d){return d.status || (Array.isArray(d.questions) ? 'waiting' : 'archived');}
    function sortRank(list, mode){return [...list].sort((a,b)=> mode==='supervivencia' ? ((b.lives??0)-(a.lives??0)|| (b.correctCount??0)-(a.correctCount??0)|| (b.totalScore??0)-(a.totalScore??0)) : ((b.totalScore??0)-(a.totalScore??0)));}
    function instructions(mode){return mode==='supervivencia' ? ['Empiezan con 3 vidas.','Cada error quita 1 vida.','Cada 3 aciertos seguidos da 1 vida extra.','Sin vidas quedas eliminado.','Gana quien sobreviva mejor y acumule más.'] : ['Responde antes de que acabe el tiempo.','Acierta rápido para ganar más puntos.','Si fallas, sigues jugando.','El ranking se actualiza después de cada pregunta.','Gana quien tenga más puntos al final.'];}
    function setPill(text, extraClass){pillEl.className = `pill ${extraClass || ''}`.trim(); pillEl.textContent = text;}
    function renderAvatarWall(d){
      stopScreenTimer();
      setPill('👥 Sala de avatares','pulse');
      const rows=participants.map(p=>`<div class="avatar-card">${avatarImg(p)}<div class="avatar-name">${esc(p.nickname||'Jugador')}</div><div class="avatar-score">Listo</div></div>`).join('') || '<div class="center empty-state"><p class="hint">Aún no hay participantes. Comparte el enlace para que se unan.</p></div>';
      cardEl.innerHTML=`<div class="center"><div class="big section-title">${participants.length}</div><p class="hint">participantes conectados</p></div><div class="avatar-grid">${rows}</div>`;
    }
    function renderInstructions(d){
      const mode=modeOf(d); setPill('📖 Instrucciones');
      stopScreenTimer();
      cardEl.innerHTML=`<div class="center"><div class="big section-title">${mode==='supervivencia'?'❤️ Supervivencia':'🎯 Clásico'}</div><p class="hint">Lean las reglas antes de iniciar</p></div><ul class="instructions">${instructions(mode).map(x=>`<li>✅ ${x}</li>`).join('')}</ul>`;
    }
    function stopScreenTimer(){
      if(screenTimerInterval){ clearInterval(screenTimerInterval); screenTimerInterval = null; }
    }
    function updateScreenTimer(deadline, timeLimit){
      const box = document.getElementById('screenTimerBox');
      const number = document.getElementById('screenTimerNumber');
      const fill = document.getElementById('screenTimerFill');
      if(!box || !number || !fill) return;
      const total = Math.max(1, Number(timeLimit || 30));
      const remainingMs = Math.max(0, Number(deadline || 0) - Date.now());
      const remaining = Math.ceil(remainingMs / 1000);
      const pct = Math.max(0, Math.min(100, (remainingMs / (total * 1000)) * 100));
      number.textContent = remaining;
      fill.style.width = `${pct}%`;
      box.classList.toggle('low', remaining <= 5 && remaining > 0);
      if(remaining <= 0) stopScreenTimer();
    }
    function startScreenTimer(deadline, timeLimit){
      stopScreenTimer();
      updateScreenTimer(deadline, timeLimit);
      screenTimerInterval = setInterval(() => updateScreenTimer(deadline, timeLimit), 250);
    }
    function renderQuestion(d){
      const q=(d.questions||[])[d.currentQuestion||0]||{}; setPill(`▶️ Pregunta ${(d.currentQuestion||0)+1}/${(d.questions||[]).length}`,'pulse');
      const timeLimit = q.timeLimit || 30;
      const deadline = d.questionDeadline || (Date.now() + timeLimit * 1000);
      cardEl.innerHTML=`<div class="question-layout"><div><div class="question center">${esc(q.text||'Pregunta activa')}</div><div class="options">${(q.options||[]).map((o,i)=>`<div class="option"><strong>${'ABCD'[i]||''}.</strong> <span>${esc(o)}</span></div>`).join('')}</div><p class="hint center" style="margin-top:1.2rem">Responde desde tu dispositivo</p></div><aside class="screen-timer" id="screenTimerBox"><div class="timer-number" id="screenTimerNumber">${timeLimit}</div><div class="timer-label">segundos</div><div class="timer-track"><div class="timer-fill" id="screenTimerFill"></div></div></aside></div>`;
      startScreenTimer(deadline, timeLimit);
    }
    function renderRanking(d){
      stopScreenTimer();
      const mode=modeOf(d); setPill(statusOf(d)==='finished'?'🏁 Resultado final':'📊 Ranking');
      const rows=sortRank(participants,mode).map((p,i)=>`<div class="rank-row top${i+1}"><div class="pos">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>${avatarImg(p)}<div class="player-cell"><div class="avatar-name">${esc(p.nickname||'Jugador')}</div></div><div class="score">${mode==='supervivencia'?`${p.lives??0}❤️ · ${p.correctCount??0}✓ · ${p.totalScore??0} pts`:`${p.totalScore??0} pts`}</div></div>`).join('') || '<div class="center empty-state"><p class="hint">Sin ranking todavía.</p></div>';
      cardEl.innerHTML=`<div class="center"><div class="big section-title">${statusOf(d)==='finished'?'Resultados':'Ranking'}</div><p class="hint">${mode==='supervivencia'?'Vidas, aciertos y puntaje':'Puntaje acumulado'}</p></div><div class="ranking">${rows}</div>`;
    }
    function renderStopped(){stopScreenTimer(); setPill('⏹️ Detenido'); cardEl.innerHTML='<div class="center empty-state"><div class="big section-title">Coyohoot detenido</div><p class="hint">El admin cerró la sesión. Ya no se aceptan respuestas.</p></div>';}
    function render(){
      if(!quizId){cardEl.innerHTML='<div class="center empty-state"><div class="big section-title">Sin quizId</div><p class="hint">Abre esta pantalla desde el panel de admin.</p></div>';return;}
      if(!quizData) return;
      const d=quizData, st=statusOf(d), rs=d.roundState, sm=d.screenMode;
      titleEl.textContent=d.name||'Coyohoot'; subtitleEl.textContent=(modeOf(d)==='supervivencia'?'Modo Supervivencia':'Modo Clásico'); countEl.textContent=`${participants.length} participante${participants.length===1?'':'s'}`;
      if(st==='stopped' || rs==='stopped') return renderStopped();
      if(st==='finished') return renderRanking(d);
      if(st==='active' && d.showRanking) return renderRanking(d);
      if(st==='active') return renderQuestion(d);
      if(rs==='instructions' || sm==='instructions') return renderInstructions(d);
      return renderAvatarWall(d);
    }
    if(quizId){
      db.collection('coyohoots').doc(quizId).onSnapshot(s=>{quizData=s.exists?s.data():null; render();});
      db.collection('coyohoots').doc(quizId).collection('participants').onSnapshot(s=>{participants=[];s.forEach(doc=>participants.push({id:doc.id,...doc.data()})); render();});
    } else render();
  </script>
</body>
</html>
